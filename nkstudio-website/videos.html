<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NK Stúdió videótár cégvezetőknek.">
  <title>NK Stúdió Videótár</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar" id="top">
    <a class="logo" href="index.html" aria-label="Vissza a főoldalra">NK STÚDIÓ</a>
    <nav aria-label="Videótár navigáció">
      <a href="index.html">Főoldal</a>
    </nav>
  </header>

  <main>
    <section class="hero hero-small">
      <h1>Virtuális asszisztencia videótár</h1>
      <p>Rövid videók cégvezetőknek rendszerszemléletről, delegálásról és hatékony működésről.</p>
    </section>

    <section class="video-section section">
      <div class="video-grid">
        <iframe src="https://www.youtube.com/embed/VIDEO1" title="Videó 1" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/VIDEO2" title="Videó 2" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/VIDEO3" title="Videó 3" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
    </section>
  </main>
</body>
</html>
